plan_id: role-skills-test-suite-update
iteration: 1
based_on: .claude/features.json#role-skills-test-suite-update

problem: |
  The orchestrator-refactor batch (create-role-skills,
  refactor-{single,three,feedback}-orchestrator,
  switch-dev-mode-migration-rewrite, framework-check-cat4-removal) has
  shipped, so the test suite no longer matches the architecture: there
  is no surviving Plan-summary fence in agent-templates that needs a
  byte-parity guard, the briefs the humanize tests inspect are now
  served from role skills, and the agent-templates lint-scope test
  guards a coupling the orchestrators no longer rely on. New behavior
  also lacks coverage: nothing currently fails when an orchestrator
  drops the Skill(sp-harness:sp-<role>-role) dispatch contract or when
  switch-dev-mode forgets to enumerate one of the four stale agent
  files. Without this clean-up the suite either ratifies dead surface
  area or leaves the just-shipped contracts unguarded; with it the
  remaining tests are all live and the role-skill architecture has a
  green regression baseline. As a final administrative step, the
  queued language-pin-emit-self-check-coverage feature's step list
  must be reconciled against the new architecture before it is
  picked up.

steps:
  - id: S1
    desc: Add role-skill dispatch smoke test
    approach: |
      Create tests/role-skill-dispatch-smoke/ with a structural
      assertion (no live subagent dispatch) that mirrors the
      precedent set by tests/refactor-three-agent-orchestrator/,
      tests/refactor-single-agent-orchestrator/,
      tests/refactor-feedback-orchestrator/. For each of the four
      orchestrator entry points — skills/single-agent-development,
      skills/three-agent-development, skills/feedback,
      and the orchestrator hop that wraps each role — read the
      relevant SKILL.md, locate the dispatch block (Step 2 / 3 / 4
      sections in three-agent; Phase 1 / 2 / 3 in single-agent;
      Step 1 in feedback), and assert two literals appear inside
      that block: "subagent_type='general-purpose'" and
      "sp-harness:sp-<role>-role" with the correct role token. Also
      add a negative assertion that the legacy "@agent sp-<role>"
      verb is absent and that the literal phrase
      "Skill(sp-harness:sp-<role>-role) FIRST" (or its current
      orchestrator wording for "invoke the role skill before any
      other tool call") appears in the dispatch contract section.
      Single test file with one TestCase per role; no fixtures, no
      tmpdir.
    files:
      create:
        - tests/role-skill-dispatch-smoke/__init__.py
        - tests/role-skill-dispatch-smoke/test_dispatch_contract.py
      modify: []
      test:
        - tests/role-skill-dispatch-smoke/test_dispatch_contract.py
    test_plan:
      - Each role's dispatch block contains both
        subagent_type='general-purpose' and the matching role-skill
        identifier.
      - Legacy "@agent sp-<role>" pattern is absent from every
        orchestrator SKILL.md.
      - Dispatch contract section names "general-purpose" and the
        role-first-invocation rule (the "Skill(...) FIRST" wording
        used by three-agent today).
      - Test fails if a future edit reintroduces .claude/agents/
        sp-<role>.md as the dispatch target.
    coverage_min: 90

  - id: S2
    desc: Add agent-file-migration test
    approach: |
      Create tests/agent-file-migration/ with two layers, both
      static (no live skill execution). Layer A: structural
      assertions on skills/switch-dev-mode/SKILL.md re-confirm what
      tests/switch-dev-mode-migration-rewrite/ already locks
      (cleanup section enumerates all four stale files, no
      template-copy / drift / regenerate vocabulary, dev_mode
      toggle is the only persisted side effect). Layer B:
      behavior simulation — a Python helper that mirrors the
      skill's own algorithm (read sp-harness.json, glob the four
      paths under .claude/agents/, delete those that exist,
      re-read sp-harness.json and verify dev_mode field updated).
      The helper runs against a tmpdir fixture seeded with a
      stub sp-harness.json plus all four stale files; the test
      asserts post-state matches the contract (dev_mode flipped,
      four files gone, sp-harness.json unrelated fields
      preserved, .claude/agents/state/ untouched). The simulator
      lives in the test file, not in production code. Layer A
      catches regressions in the SKILL prose; Layer B catches
      regressions in anyone re-implementing the cleanup
      algorithm.
    files:
      create:
        - tests/agent-file-migration/__init__.py
        - tests/agent-file-migration/test_migration.py
      modify: []
      test:
        - tests/agent-file-migration/test_migration.py
    test_plan:
      - skills/switch-dev-mode/SKILL.md still enumerates all four
        cleanup targets and still mentions sp-harness.json /
        dev_mode (overlap with switch-dev-mode-migration-rewrite
        is intentional — kept narrow so a future SKILL rewrite
        does not silently shrink coverage).
      - Behavior simulation on a tmpdir: post-cleanup state has
        all four agent files gone, dev_mode toggled, other JSON
        fields unchanged, .claude/agents/state/ contents
        preserved.
      - Edge: stale-files set is empty → simulator is a no-op,
        sp-harness.json unchanged.
      - Edge: only some of the four files exist → simulator
        deletes only those that exist, no errors.
    coverage_min: 90

  - id: S3
    desc: Delete the three obsoleted test directories
    approach: |
      Remove tests/canonical-plan-summary-parity/ if it exists on
      disk (current state: not present — verified during planning,
      so this sub-step is a no-op safety check rather than a real
      deletion). Remove tests/humanize-planner-evaluator-briefs/
      whole directory. Remove
      tests/output-prose-agent-templates-lint-scope/ whole
      directory. After deletion, grep the remaining tests/ tree
      for any string reference to the three deleted directory
      names; assert zero matches before continuing. This step
      depends on the D1 outcome only for the lint-scope test —
      see decisions[].
    files:
      create: []
      modify: []
      test: []
    test_plan:
      - The three target directories no longer exist in tests/.
      - No remaining test imports from or references the three
        deleted paths by string.
      - pytest collection over tests/ still succeeds.
    coverage_min: 80

  - id: S4
    desc: Run pytest and confirm green baseline
    approach: |
      Run `pytest tests/` from the repo root. Expect every
      remaining test directory to pass. If anything fails,
      diagnose before proceeding — the deletions in S3 should
      not produce failures elsewhere; if they do, S3's delete
      list is incomplete or a coupling we missed exists. Capture
      the pytest summary line in the eval log so a future reader
      can confirm the baseline was actually green at merge time.
    files:
      create: []
      modify: []
      test: []
    test_plan:
      - pytest tests/ exits 0.
      - Summary names the new tests/role-skill-dispatch-smoke/
        and tests/agent-file-migration/ directories among
        passing collections.
      - No collection error, no skipped-due-to-import-error
        anywhere.
    coverage_min: 90

  - id: S5
    desc: Reconcile language-pin feature step list
    approach: |
      Inspect features.json entry
      language-pin-emit-self-check-coverage. The current step
      list already contains 4 steps (cap removal across
      skills/*/SKILL.md, language-pin scan added to
      using-sp-harness, role-skill self-check upgrade for
      sp-planner-role / sp-evaluator-role, regression test).
      The dispatch instruction frames this step as "drop steps
      4/5/6 of the original 8" — the residual the dispatcher
      expects matches what is currently stored. Either way,
      run `manage-features update language-pin-emit-self-
      check-coverage --steps <residual-4>` to make the
      reconciliation explicit and idempotent: even if the
      stored list already matches, the call leaves a record
      that the trim was reviewed in this feature. The four
      residual step strings are the ones currently in
      features.json verbatim. Do NOT modify the description
      text in this step (that is also out of date — references
      "six emit points" — but description-vs-steps drift is a
      separate concern; surface it in the commit message but
      do not silently rewrite description here). Document the
      reconciliation in the commit message of this feature
      per the spec.
    files:
      create: []
      modify:
        - .claude/features.json
      test: []
    test_plan:
      - features.json entry for
        language-pin-emit-self-check-coverage has exactly the
        four residual steps after S5.
      - No reference in those four steps to three-agent Touch
        Point 1, Touch Point 2, agent-templates inline self-
        check, or any artifact that no longer exists.
      - manage-features update call succeeded (exit 0) and the
        post-state JSON validates against the manage-features
        schema check.
    coverage_min: 80

decisions:
  - id: D1
    question: |
      Should the new tests/role-skill-content-parity/ regression
      (originally feature step 3) be added to this plan, given
      that role-skill bodies and agent-templates bodies already
      diverge today (sp-planner: 25-line drift, sp-evaluator:
      28-line drift; sp-generator and sp-feedback do match
      byte-for-byte)?
    planner_view: drop_step_3
    confidence: 60
    rationale: |
      The dispatch instruction itself flags step 3 as
      "decision worth surfacing" because it is conditional on
      whether agent-templates/ stays alive. We verified
      agent-templates/ IS still in active use:
      skills/init-project/SKILL.md reads
      ${CLAUDE_PLUGIN_ROOT}/agent-templates/sp-{planner,
      generator,evaluator,feedback}.md to bootstrap project-
      level subagent files; skills/framework-check/SKILL.md
      still scans the directory for CJK leakage. So
      agent-templates/ is NOT going away. But content parity
      is already broken at planning time — the planner role
      skill diverges from agent-templates/sp-planner.md by 25
      lines and evaluator by 28 lines. Writing the parity
      assertion now would either fail on day one (rejecting a
      green baseline) or require copying those bodies back
      into sync first, which is a content edit not authorized
      by this feature's scope. The honest move is to drop the
      step and capture the divergence as a separate
      decision-worthy debt: either delete agent-templates/
      after migrating init-project to read role-skill bodies,
      or accept divergence and spec the differences. Either
      path is a feature of its own, not a regression test
      buried in a test-suite-cleanup feature.
    alternatives:
      - option: add_parity_test_with_synchronization_step
        rejected_because: |
          Would require an unscoped content edit to copy
          role-skill bodies back into agent-templates/sp-
          planner.md and sp-evaluator.md. That edit is
          behavior-shaping — it modifies what init-project
          ships into new projects — and per CLAUDE.md must
          route through writing-skills with eval evidence.
          Not appropriate to bundle inside a test-suite
          cleanup feature.
      - option: add_parity_test_marked_xfail
        rejected_because: |
          A regression test marked xfail is signal noise; it
          ratifies the drift instead of forcing a decision
          and clutters the green baseline.
      - option: keep_parity_test_for_generator_and_feedback_only
        rejected_because: |
          Partial parity guards only the two role skills that
          happen to match today; the asymmetry is fragile
          (any future edit to sp-generator-role would
          silently fail this test even if the divergence is
          deliberate) and does not catch the actual risk
          (planner / evaluator drift).
    ask_user: true
    user_decision: |
      (a) Drop the parity test entirely. Whether agent-templates/ is
      retired or whether parity is enforced at all is left as a
      separate, properly-scoped feature input. This feature ships
      cleanly without dragging behavior-shaping content edits into a
      test-suite cleanup. User confirmed Planner's recommendation
      2026-04-29.

  - id: D2
    question: |
      Should the role-skill dispatch smoke test (S1) be a
      structural string-match assertion against orchestrator
      SKILL.md files, or a behavior simulation that mocks a
      subagent dispatch and asserts the first tool call?
    planner_view: structural_only
    confidence: 85
    rationale: |
      The dispatch instruction explicitly notes that
      "structural assertions" are the precedent set by
      tests/refactor-{single,three,feedback}-orchestrator/.
      Reading those tests confirms: every existing orchestrator
      test reads SKILL.md and asserts substrings like
      "subagent_type='general-purpose'" and
      "sp-harness:sp-<role>-role". Behavior simulation
      (mocking subagent dispatch, capturing the actual
      tool-use log) would require either intercepting the
      Agent SDK or running a real subagent in CI — neither is
      a deterministic unit test, both add CI complexity for
      coverage we already get structurally. Structural is
      the right call.
    alternatives:
      - option: behavior_simulation_with_mocked_dispatch
        rejected_because: |
          Brittle (mocks drift from real Agent SDK), high
          maintenance, and provides no signal a structural
          assertion does not already provide. The thing we
          care about is "does the SKILL.md tell the
          subagent to invoke the role skill first" — that
          is text, and text-grep is the right test shape.
    ask_user: false
    user_decision: null

  - id: D3
    question: |
      Should the agent-file-migration test (S2) be structural-
      only, or include a tmpdir behavior simulation of the
      cleanup algorithm?
    planner_view: both_layers
    confidence: 75
    rationale: |
      Pure structural would duplicate
      tests/switch-dev-mode-migration-rewrite/ — that suite
      already locks the SKILL.md prose (cleanup targets
      enumerated, dev_mode toggle present, no template-copy
      vocabulary). Adding ANOTHER structural test would be
      redundant. The behavior-simulation layer catches a
      different class of regression: someone re-implements
      the cleanup algorithm wrong (forgets to preserve
      .claude/agents/state/, blows away unrelated JSON
      fields, etc.). A small Python helper that mirrors the
      algorithm and runs against a tmpdir fixture is
      deterministic, fast, and has zero CI infra cost.
      Keeping a thin structural layer too is cheap and
      defends against future SKILL rewrites that silently
      shrink the cleanup target list.
    alternatives:
      - option: structural_only_skip_simulation
        rejected_because: |
          Redundant with switch-dev-mode-migration-rewrite;
          adds no new coverage; misses algorithmic
          regressions.
      - option: simulation_only_skip_structural
        rejected_because: |
          Loses the cheap insurance against SKILL prose
          drift. The two layers cost almost nothing
          together.
    ask_user: false
    user_decision: null

  - id: D4
    question: |
      For step S5 — reconciling
      language-pin-emit-self-check-coverage — what are the
      four residual steps that survive in the new architecture?
    planner_view: keep_currently_stored_4_steps_verbatim
    confidence: 80
    rationale: |
      Read the live features.json entry and confirmed it
      already stores exactly four steps:
      (1) remove global line caps from
      skills/*/SKILL.md emit points and replace each with
      the "structure decides shape" sentence;
      (2) add a language-pin scan item to
      skills/using-sp-harness/SKILL.md Output prose self-
      check;
      (3) ensure sp-planner-role and sp-evaluator-role each
      have the 6-item enumerated self-check block before
      their emit templates, matching the pattern from
      single-agent-development Phase 3;
      (4) regression test that greps every output-template
      fence in skills/*/SKILL.md for self-check presence
      and asserts no obsolete line-cap phrases remain.
      Mapping these against the description's "six emit
      points" list shows the missing two (three-agent Touch
      Point 1 and Touch Point 2 inline self-checks plus
      agent-template inline self-checks) are exactly the
      steps the dispatch instruction wanted dropped — they
      are subsumed by sp-planner-role / sp-evaluator-role
      self-checks in the new architecture (orchestrator
      Touch Points no longer print directly; they route
      role-skill emit). The currently-stored 4 steps are
      already the residual. S5 calls
      manage-features update with these four anyway, so the
      reconciliation is explicit and idempotent and the
      commit message documents the trim.
    alternatives:
      - option: rewrite_step_3_to_explicitly_list_remaining_emit_points
        rejected_because: |
          Tightening step 3 to enumerate sp-planner-role +
          sp-evaluator-role makes the wording more precise
          but the current generic "6-item enumerated self-
          check block" already covers it via the
          "single-agent-development Phase 3" pattern
          reference. Tightening introduces an unscoped
          content edit; defer to whoever picks up
          language-pin-emit-self-check-coverage.
      - option: also_drop_step_4_regression_test
        rejected_because: |
          The regression test in step 4 is the whole point
          of the feature (it locks every emit-point
          self-check + cap removal into a perpetual guard).
          Dropping it would gut the feature.
      - option: also_rewrite_description_to_match_4_step_reality
        rejected_because: |
          Description text drift ("six emit points" no
          longer matches "four steps") is a real bug, but
          rewriting it changes feature semantics and is
          out of scope for a test-suite cleanup feature.
          Surface in commit message; let the next planner
          decide.
    ask_user: false
    user_decision: null

