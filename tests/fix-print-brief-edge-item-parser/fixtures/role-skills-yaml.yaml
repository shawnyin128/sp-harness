flags_for_eval:
  - |
    S1's TestSingleAgentOrchestratorDispatch class intentionally
    does NOT assert subagent_type='general-purpose' because
    single-agent dispatches role skills via in-session Skill(...)
    with no subagent boundary. The plan's test_plan item 1 for
    S1 says "Each role's dispatch block contains both
    subagent_type='general-purpose' and the matching role-skill
    identifier" — strictly read, that would fail for
    single-agent. Evaluator should confirm this scope
    interpretation matches the user's intent (the plan and the
    existing tests/refactor-single-agent-orchestrator/ suite
    both treat single-agent as the in-session exception). If
    Evaluator disagrees, the fix is one TestCase swap.
  - |
    S2's _simulate_cleanup mirrors the SKILL.md algorithm but
    is NOT a direct invocation of the live skill (the SKILL is
    English prose, not Python). Evaluator should diff the
    simulator step-by-step against the SKILL's "Steps 1-4"
    section to confirm fidelity. The simulator preserves JSON
    key order because the SKILL prose says "preserving every
    other field unchanged" — strict reading suggests order
    should be preserved too; if Evaluator believes key-order
    preservation is over-spec, the TestCleanupSimulatorPreservesJsonKeyOrder
    case can be relaxed without affecting Layer A or the other
    Layer B tests.
  - |
    S3 deleted tests/humanize-planner-evaluator-briefs/ even
    though it was already untracked by git in the canonical
    history. The directory had been recreated locally
    (test_templates.py reappeared on disk despite being deleted
    in commit 22ff135). The deletion is therefore a working-tree
    cleanup with no commit-visible change beyond git's existing
    record. Evaluator may want to confirm nothing else in the
    working tree is in a similar "resurrected from history"
    state.
  - |
    S5 produced no commit because the byte-identical input
    yielded a byte-identical output. The Planner's D4
    rationale anticipated this (the call is "explicit and
    idempotent" — the explicit reconciliation record is the
    successful CLI invocation, not a diff). Evaluator should
    decide whether a soft no-op commit (e.g. `--allow-empty`)
    is needed for an audit trail; the current decision was to
    skip per repository git-convention norms (no empty commits).
  - |
    All S1/S2 tests are STRUCTURAL (string-grep / tmpdir
    simulation) — they are deterministic and fast but they do
    NOT exercise the live Agent SDK dispatch path or the live
    switch-dev-mode skill. Evaluator should consider whether
    this is the right shape for a long-lived regression suite,
    or whether at least one end-to-end smoke (e.g. dispatch a
    real Skill() invocation in a sandbox) would be worth
    adding in a follow-up feature. Per D2's planner_view this
    is the deliberate choice; flagging only so Evaluator can
    re-affirm.
  - |
    Final pytest run summary: 174 tests, 0 failures, 0 errors.
    New suites collected: tests/role-skill-dispatch-smoke (19)
    and tests/agent-file-migration (9). No skips, no collection
    errors. Baseline is genuinely green.
  - |
    Pre-existing observation (NOT introduced by this Generator):
    the locked Planner section's test_plan items contain
    unquoted colon-space sequences inside list items (e.g.
    "Behavior simulation on a tmpdir: post-cleanup state ..."
    in S2.test_plan), which makes the file fail strict
    yaml.safe_load. Nothing in the codebase actually parses
    plan YAML programmatically (verified via grep), so this
    has no runtime impact, but Evaluator may want to flag it
    as a Planner-side hygiene item for a future feature.

